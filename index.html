<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>App Hub</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #333;
      overscroll-behavior: none;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    nav {
      display: flex;
      justify-content: center;
      background: #34495e;
      padding: 10px;
    }
    nav button {
      background: transparent;
      background-color:#111e7f;
      color: #ffffff;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      margin: 0 5px;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
      cursor: pointer;
    }
    nav button:hover {
      background-color: #060b35;
      color: #ffffff;
    }
    main {
      display: flex;
      justify-content: center;
    }
    iframe {
      border: none;
      width: 100%;
      height: 100vh;      background: #f4f6f9;    }
  </style>
</head>
<body>
  <nav>
    <button onclick="navigate('app1.html')">Pomodoro Timer</button>
    <button onclick="navigate('app2.html')">Weather App</button>
    <button onclick="navigate('app3.html')">To-do List</button>
    <button onclick="navigate('app4.html')">Random Password Generator</button>
  </nav>

  <main>
    <iframe id="view">
      
    </iframe>
  </main>

  <script>
    function navigate(page) {
      document.getElementById("view").src = page;
    }
    // Default setting: App1 - Pomodoro Timer
    navigate("app1.html");
  </script>
</body>
</html>
