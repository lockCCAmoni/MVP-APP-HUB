<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="app4.css">
</head>
<body>
    <div class="container">
        <h1>
            Generate a <br> <span>Randowm Password</span>
        </h1>

        <div class="display">
            <input type="text" id="password" placeholder="Password">
            <img src="Random PWD img/copy.png" alt="Copy" onclick="copyPassword()">
        </div>
        <button onclick="generatePassword()"> <img src="Random PWD img/generate.png" alt="generate pwd">Generate Password</button>
    </div>
    <script>
        const passwordBox = document.getElementById("password");
        const lenght = 12;

        const upperCase = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lowerCase = "abcdefghijklmnopqrstuvwxyz";
        const numbers = "0123456789";
        const symbols = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

        function generatePassword() {
            let password = "";
            const allCharacters = upperCase + lowerCase + numbers + symbols;
            for (let i = 0; i < lenght; i++) {
                const randomIndex = Math.floor(Math.random() * allCharacters.length);
                password += allCharacters[randomIndex];
            }
            passwordBox.value = password;
            console.log("password: " +passwordBox.value);
        }

        document.getElementById("generate").addEventListener("click", generatePassword);

        function copyPassword() {
            navigator.clipboard.writeText(passwordBox.value).then(() => {
                alert("Password copied to clipboard!");
            }).catch(() => {
                alert("Failed to copy password!");
            });
        }

        document.getElementById("copy").addEventListener("click", copyPassword);
    </script>
</body>
</html>
